name: Run CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '39 13 * * *' # run daily

jobs:
  ci_build:
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04, ubuntu-22.04-arm, ubuntu-24.04-arm, macos-14, macos-15, macos-26, macos-15-intel, macos-26-intel ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35 # runtime across all OSs, runs can get queued
    steps:
    - name: Runner Info
      run: printenv | sort

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0' # need full history to get version from git tag

    - name: Install packaged dependencies
      run: .github/install_dependencies

    - name: Build and Unit Tests
      run: VERBOSE=1 scripts/run_unit_tests

    # RNNoise build smoke-test: Linux only (librnnoise-dev / libsamplerate0-dev
    # come from apt; macOS brew doesn't ship rnnoise in core formulae). The
    # build is opt-in via -DRNNOISE=ON so the default matrix above never touches
    # this code path — this step guards against bitrot.
    - name: Build with RNNoise (Linux only)
      if: runner.os == 'Linux'
      run: |
        cmake -B builds/Release_rnnoise \
          -DCMAKE_BUILD_TYPE=Release \
          -DRNNOISE=ON \
          -DBUILD_UNITTESTS=TRUE \
          -DPLATFORM=native
        cmake --build builds/Release_rnnoise -j
        ./builds/Release_rnnoise/src/unittests

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Run system tests
      run: |
        EXTRA_ARGS=()
        if [ -f builds/Release_rnnoise/src/rtl_airband ]; then
          EXTRA_ARGS+=(--rnnoise-binary builds/Release_rnnoise/src/rtl_airband)
        fi
        uv run --no-group dev pytest system_tests/tests/ \
          --binary builds/Release/src/rtl_airband \
          --nfm-binary builds/Release_nfm/src/rtl_airband \
          "${EXTRA_ARGS[@]}" \
          --mode thorough \
          --clean \
          -v

    - name: Install rtl_airband
      run: sudo cmake --install ${{github.workspace}}/builds/Release

    - name: Test run
      run: /usr/local/bin/rtl_airband -v
